spring.application.name=social-view

# JWT

spring.jwt.secret=${JWT_SECRET}

# Internal Service Secret

service.secret=${SERVICE_SECRET}

# Internal Services

interest.uri=http://interest-service:8088
reel.uri=http://reel-service:8084

# Health

health.uri=http://view-service:8087/api/health

# Server

server.port=8087

# Logging

logging.level.org.springframework.web=INFO
logging.level.root=INFO
logging.level.com.example.social_view=INFO
logging.level.org.springframework=INFO

# Actuator

management.endpoint.health.show-details=always
management.datadog.metrics.export.enabled=true
management.defaults.metrics.export.enabled=true

management.metrics.use-global-registry=true
management.endpoint.metrics.enabled=true

management.endpoint.web.base-path=/actuator
management.endpoints.web.exposure.include=*
