spring.application.name=social_likes

# MongoDB

spring.data.mongodb.uri=${MONGO_URI}

# JWT

spring.jwt.secret=${JWT_SECRET}

# Internal Service Authentication

service.secret=${SERVICE_SECRET}

# Internal Services

reel.service=http://reel-service:8084
post.service=http://post-service:8082
profile.uri=http://profile-service:8081
view.uri=http://view-service:8087

# Health

health.api=http://likes-service:8083/api/health

# Server

server.port=8083

# Logging

logging.level.org.springframework.web=INFO
logging.level.root=INFO
logging.level.com.example.social_likes=INFO
logging.level.org.springframework=INFO

# Actuator

management.endpoint.health.show-details=always
management.datadog.metrics.export.enabled=true
management.defaults.metrics.export.enabled=true

management.metrics.use-global-registry=true
management.endpoint.metrics.enabled=true

management.endpoint.web.base-path=/actuator
management.endpoints.web.exposure.include=*
