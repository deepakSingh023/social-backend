spring.application.name=Social-profile

# Retry

resilience4j.retry.instances.importantApi.max-attempts=3
resilience4j.retry.instances.importantApi.wait-duration=2s
resilience4j.retry.instances.importantApi.enable-exponential-backoff=true
resilience4j.retry.instances.importantApi.exponential-backoff-multiplier=2
resilience4j.retry.instances.importantApi.retry-exceptions=\
java.net.ConnectException,\
java.net.SocketTimeoutException,\
feign.RetryableException

# Circuit Breaker

resilience4j.circuitbreaker.instances.importantApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.importantApi.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.importantApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.importantApi.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.importantApi.permitted-number-of-calls-in-half-open-state=3

# Security

jwt.secret=${JWT_SECRET}
secret.service=${SERVICE_SECRET}

# MongoDB

spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=social_profile

# Cloudflare R2

cloudflare.r2.access-key=${R2_ACCESS_KEY}
cloudflare.r2.secret-key=${R2_SECRET_KEY}
cloudflare.r2.account-id=${R2_ACCOUNT_ID}
cloudflare.r2.bucket-name=profile-pic
cloudflare.r2.public-base-url=${R2_PUBLIC_BASE_URL}
cloudflare.r2.endpoint=${R2_ENDPOINT}

# Multipart Upload

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Internal Service URLs

comment.uri=http://likes-service:8083
reel.uri=http://reel-service:8084
interaction.uri=http://interaction-service:8085
post.uri=http://post-service:8082
ping.api=http://profile-service:8081/api/health

# Logging

logging.level.org.springframework.web=INFO
logging.level.root=INFO
logging.level.com.example=INFO

# Server

server.port=8081

# CORS

app.cors.allowed-origins=*

# Actuator / Metrics

management.endpoint.health.show-details=always
management.defaults.metrics.export.enabled=true
management.metrics.use-global-registry=true
management.endpoint.metrics.enabled=true
management.endpoint.web.base-path=/actuator
management.endpoints.web.exposure.include=*
