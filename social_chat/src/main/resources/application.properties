spring.application.name=social-chat

# MongoDB

spring.data.mongodb.uri=${CHAT_MONGO_URI}

# Cloudflare R2

r2.region=auto
r2.endpoint=${CHAT_R2_ENDPOINT}
r2.access-key=${CHAT_R2_ACCESS_KEY}
r2.secret-key=${CHAT_R2_SECRET_KEY}
r2.bucket=chat-media
r2.public-url=${CHAT_R2_PUBLIC_URL}

# JWT

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Redis

spring.data.redis.host=redis
spring.data.redis.port=6379

# Internal Service Authentication

service.secret=${SERVICE_SECRET}

# Health

health.uri=http://nginx:8090/api/health

# Server

server.port=8090

# Logging

logging.level.org.springframework.web=INFO
logging.level.root=INFO
logging.level.com.example.social_chat=INFO
logging.level.org.springframework=INFO

# Actuator

management.endpoint.health.show-details=always
management.datadog.metrics.export.enabled=true
management.defaults.metrics.export.enabled=true

management.metrics.use-global-registry=true
management.endpoint.metrics.enabled=true

management.endpoint.web.base-path=/actuator
management.endpoints.web.exposure.include=*
